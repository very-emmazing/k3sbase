apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cilium
  namespace: flux-system
spec:
  interval: 24h
  url: https://helm.cilium.io/
---
# Release name and namespace match the cilium-cli install so Flux can adopt it.
# k8sServiceHost: IP des k3d-Server-Containers im Docker-Netzwerk.
#   Der Docker-Hostname (z.B. "k3d-local-server-0") ist nur vom Server-Node
#   selbst auflösbar (kubelet trägt ihn dort per Selbst-Eintrag in /etc/hosts
#   ein); von anderen Nodes (z.B. per "k3d node create" hinzugefügte Agents)
#   scheitert die Pod-DNS-Auflösung. Daher die konkrete IP verwenden – wird
#   von "mise run cluster-up -- local" automatisch ermittelt und gepatcht.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: cilium
      version: "${CILIUM_VERSION}"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  values:
    kubeProxyReplacement: true
    k8sServiceHost: "172.18.0.3"
    k8sServicePort: "6443"
    # Ohne dies mountet Cilium eine eigene, isolierte cgroupv2-Instanz statt
    # die vorhandene unter /sys/fs/cgroup zu nutzen.
    cgroup:
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup
    # In k3d hängen sich Ciliums Socket-LB-eBPF-Hooks wegen der verschachtelten
    # cgroup-Namespaces des k3d-Node-Containers nicht zuverlässig ein, obwohl
    # "cilium status" Socket LB als "Full coverage" meldet (verifiziert per
    # "bpftool cgroup tree"). ClusterIPs werden dann als "non-routable"
    # markiert und sind aus normalen Pods (coredns, metrics-server, ...)
    # nicht erreichbar ("connection refused"). hostNamespaceOnly beschränkt
    # Socket-LB auf den Host-Netzwerk-Namespace; reguläre Pod-Verbindungen
    # laufen dann über den tc/xdp-NAT-Pfad, der davon nicht betroffen ist.
    socketLB:
      hostNamespaceOnly: true
    operator:
      replicas: 1
