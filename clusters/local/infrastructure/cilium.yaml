apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cilium
  namespace: flux-system
spec:
  interval: 24h
  url: https://helm.cilium.io/
---
# Release name and namespace match the cilium-cli install so Flux can adopt it.
# k8sServiceHost: k3d server container hostname within the Docker network;
#   follows the k3d naming convention k3d-<cluster-name>-server-0.
#   Adjust if the cluster is named differently.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: cilium
      version: "1.16.5"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  values:
    kubeProxyReplacement: true
    k8sServiceHost: "k3d-local-server-0"
    k8sServicePort: "6443"
    operator:
      replicas: 1
