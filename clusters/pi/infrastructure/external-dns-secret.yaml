# SOPS-encrypted secret – encrypt before committing to a real cluster:
#   1. Set the actual token value below
#   2. Run: sops -e -i clusters/pi/infrastructure/external-dns-secret.yaml
#   3. Commit the encrypted file (the age recipient in .sops.yaml must be set first)
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token
  namespace: external-dns
stringData:
  token: ""
