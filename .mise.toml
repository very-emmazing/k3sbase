[tools]
kubectl    = "latest"
helm       = "latest"
flux2      = "latest"
age        = "latest"
sops       = "latest"
k3d        = "latest"
# cilium-cli: if not found, use: mise use "aqua:cilium/cilium-cli"
cilium-cli = "latest"

[env]
KUBECONFIG = "{{config_root}}/.kube/config"

[tasks.setup]
description = "Interaktiver Setup-Assistent: age-Key, SOPS-Recipient, Secrets abfragen und verschlüsseln"
run         = "bash scripts/setup.sh"

[tasks.cluster-up]
description = "Cluster erstellen (local → k3d, pi → k3s via SSH) und Kubeconfig schreiben"
run         = "bash scripts/cluster-up.sh"

[tasks.cilium-up]
description = "Cilium imperativ installieren (muss vor flux-bootstrap laufen)"
run         = "bash scripts/cilium-up.sh"

[tasks.flux-bootstrap]
description = "Flux Operator + FluxInstance + SOPS-age-Secret installieren"
run         = "bash scripts/flux-bootstrap.sh"
