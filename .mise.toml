[tools]
kubectl    = "latest"
helm       = "latest"
flux2      = "latest"
age        = "latest"
sops       = "latest"
k3d        = "latest"
# cilium-cli: if not found, use: mise use "aqua:cilium/cilium-cli"
cilium-cli = "latest"

[env]
KUBECONFIG = "{{config_root}}/.kube/config"

[tasks.setup]
description = "Interaktiver Setup-Assistent: age-Key, SOPS-Recipient, Secrets abfragen und verschlüsseln"
run         = "bash scripts/setup.sh"

[tasks.k3d-up]
description = "Create k3d cluster without CNI (flannel replaced by Cilium)"
run         = "bash scripts/bootstrap-k3d.sh"

[tasks.age-init]
description = "Generate age key and configure SOPS recipient in .sops.yaml"
run         = "bash scripts/bootstrap-age.sh"

[tasks.cilium-up]
description = "Install Cilium CNI imperatively (must run before Flux)"
run         = "bash scripts/bootstrap-cilium.sh"

[tasks.flux-bootstrap]
description = "Install Flux Operator, apply FluxInstance, create sops-age secret"
run         = "bash scripts/bootstrap-flux-operator.sh"

# ── Pi-Cluster ────────────────────────────────────────────────────────────────
[tasks.pi-up]
description = "Chrony + k3s (1 server, 3 agents) auf Pi-Nodes via SSH installieren"
run         = "bash scripts/bootstrap-pi-k3s.sh"

[tasks.pi-cilium-up]
description = "Cilium imperativ auf dem Pi-Cluster installieren (vor pi-flux-bootstrap)"
run         = "KUBECONFIG='{{config_root}}/.kube/pi-config' bash scripts/bootstrap-pi-cilium.sh"

[tasks.pi-flux-bootstrap]
description = "Flux Operator + FluxInstance + sops-age Secret auf dem Pi-Cluster"
run         = "KUBECONFIG='{{config_root}}/.kube/pi-config' bash scripts/bootstrap-pi-flux.sh"
