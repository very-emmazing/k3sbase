[tools]
kubectl           = "1.36.2"
helm              = "4.2.2"
flux2             = "2.8.8"
kustomize         = "5.8.1"
age               = "1.3.1"
sops              = "3.13.2"
k3d               = "5.9.0"
# cilium-cli: if not found, use: mise use "aqua:cilium/cilium-cli"
cilium-cli        = "0.19.5"
"pipx:flux-local" = "8.3.0"

[env]
# Defaults to the local k3d cluster; override for pi: KUBECONFIG=.kube/pi-config kubectl ...
KUBECONFIG = "{{config_root}}/.kube/config"

# Tasks liegen als ausführbare Skripte in .mise-tasks/ (Metadaten via #MISE-Header im Skript)
